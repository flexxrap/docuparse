name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: docuparse
          POSTGRES_PASSWORD: docuparse
          POSTGRES_DB: docuparse
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U docuparse"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql+asyncpg://docuparse:docuparse@localhost:5432/docuparse

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements-dev.txt

      - run: ruff check .

      - run: alembic upgrade head

      - name: Cache EasyOCR models
        uses: actions/cache@v4
        with:
          path: ~/.EasyOCR
          key: easyocr-models-en-ru

      - run: pytest

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t docuparse .
